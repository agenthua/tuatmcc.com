name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Deploy
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v4

      - name: Setup | Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          NODE_ENV: production
